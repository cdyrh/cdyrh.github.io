<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>池帅の亦殿 — 欢迎来到我的小窝 🌸</title>
<meta name="description" content="池帅の亦殿 — 生活、技术、阅读、音乐，慢慢记录的地方">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<style>
:root {
  --pink: #ff6b9d;
  --pink-light: #ff8fb5;
  --bg: #fef6f9;
  --card: #ffffff;
  --text: #2d2d2d;
  --text-light: #888;
  --border: #f0d0d8;
  --shadow: rgba(255, 107, 157, 0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
}
/* Header */
.header {
  background: linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%);
  color: white;
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px var(--shadow);
}
.header-inner {
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 1.3rem;
  font-weight: 700;
  color: white;
  text-decoration: none;
}
.nav { display: flex; gap: 1.5rem; }
.nav a {
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  font-size: 0.95rem;
}
.nav a:hover { color: white; }
/* Hero */
.hero {
  background: linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%);
  color: white;
  text-align: center;
  padding: 4rem 2rem;
}
.hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
.hero p { font-size: 1.1rem; opacity: 0.9; }
/* Container */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}
/* Sidebar & Main */
.layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 2rem;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}
/* Post Card */
.post-card {
  background: var(--card);
  border-radius: 16px;
  padding: 1.5rem 2rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 20px var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.post-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(255, 107, 157, 0.2);
}
.post-card a {
  text-decoration: none;
  color: inherit;
}
.post-meta {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 0.8rem;
  font-size: 0.85rem;
  color: var(--text-light);
  flex-wrap: wrap;
}
.post-cat {
  background: var(--pink);
  color: white;
  padding: 0.15rem 0.6rem;
  border-radius: 12px;
  font-size: 0.75rem;
}
.post-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.post-tag {
  background: var(--bg);
  color: var(--pink);
  padding: 0.1rem 0.5rem;
  border-radius: 8px;
  font-size: 0.75rem;
}
.post-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  color: var(--text);
  line-height: 1.4;
}
.post-title:hover { color: var(--pink); }
.post-summary {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.6;
}
.post-views {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-top: 0.5rem;
}
/* Sidebar */
.sidebar { }
.sidebar-card {
  background: var(--card);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 20px var(--shadow);
}
.sidebar-card h3 {
  color: var(--pink);
  margin-bottom: 1rem;
  font-size: 1rem;
}
.tag-cloud { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.tag-cloud .tag {
  background: var(--bg);
  color: var(--pink);
  padding: 0.3rem 0.8rem;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.tag-cloud .tag:hover { background: var(--pink); color: white; }
.cat-list { list-style: none; }
.cat-list li {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: color 0.2s;
}
.cat-list li:hover { color: var(--pink); }
.cat-list li:last-child { border-bottom: none; }
/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-light);
  font-size: 0.9rem;
  border-top: 1px solid var(--border);
  margin-top: 3rem;
}
/* Filter */
.filter-bar {
  display: flex;
  gap: 0.8rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 0.4rem 1rem;
  border: 2px solid var(--pink);
  border-radius: 20px;
  background: white;
  color: var(--pink);
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--pink);
  color: white;
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">🌸 池帅の亦殿</a>
    <nav class="nav">
      <a href="/">首页</a>
      <a href="#archive">归档</a>
      <a href="#about">关于</a>
    </nav>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <h1>🌸 欢迎来到我的小窝</h1>
  <p>生活 · 技术 · 阅读 · 音乐 — 慢慢记录的地方</p>
</section>

<!-- Main Content -->
<div class="container">
  <div class="layout">
    <!-- Posts -->
    <main id="main-content">
      <div class="filter-bar" id="filter-bar"></div>
      <div id="posts-container"></div>
    </main>
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>📂 分类</h3>
        <ul class="cat-list" id="cat-list"></ul>
      </div>
      <div class="sidebar-card">
        <h3>🏷️ 标签云</h3>
        <div class="tag-cloud" id="tag-cloud"></div>
      </div>
    </aside>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <p>© 2026 池帅の亦殿 • 用 ❤️ 和 ☕ 驱动</p>
  <p style="margin-top:0.5rem;font-size:0.8rem;">
        现在每篇文章都有独立页面，方便分享和转发！🔗
      </p>
</footer>

<!-- Data -->
<script>
// 文章数据（由 Python 脚本自动生成）
const POSTS_DATA = [];

// 加载文章列表
fetch('/posts/post_list.json')
  .then(res => res.json())
  .then(posts => {
    window.ALL_POSTS = posts;
    renderPosts(posts);
    renderCats(posts);
    renderTags(posts);
  })
  .catch(err => {
    console.error('加载文章列表失败:', err);
    document.getElementById('posts-container').innerHTML = 
      '<p style="text-align:center;color:#888;">加载文章列表失败，请稍后再试。</p>';
  });

// 渲染文章列表
function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (posts.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#888;">暂无文章</p>';
    return;
  }
  
  container.innerHTML = posts.map(post => `
    <div class="post-card" onclick="location.href='${post.url}'">
      <a href="${post.url}">
        <div class="post-meta">
          <span class="post-cat">${post.cat}</span>
          <span class="post-tags">${post.tags ? post.tags.map(t => `<span class="post-tag">${t}</span>`).join('') : ''}</span>
          <span>📅 ${post.date}</span>
        </div>
        <div class="post-title">${post.cover || ''} ${post.title}</div>
        <div class="post-views">👁️ ${post.views || 0} 次阅读</div>
      </a>
    </div>
  `).join('');
}

// 渲染分类
function renderCats(posts) {
  const cats = [...new Set(posts.map(p => p.cat))];
  const list = document.getElementById('cat-list');
  list.innerHTML = cats.map(cat => 
    `<li onclick="filterByCat('${cat}')">${cat} (${posts.filter(p => p.cat === cat).length})</li>`
  ).join('');
}

// 渲染标签云
function renderTags(posts) {
  const tags = {};
  posts.forEach(p => {
    if (p.tags) {
      p.tags.forEach(t => { tags[t] = (tags[t] || 0) + 1; });
    }
  });
  const tagCloud = document.getElementById('tag-cloud');
  tagCloud.innerHTML = Object.entries(tags).map(([tag, count]) => 
    `<span class="tag" onclick="filterByTag('${tag}')">${tag} (${count})</span>`
  ).join('');
}

// 筛选功能
function filterByCat(cat) {
  const filtered = window.ALL_POSTS.filter(p => p.cat === cat);
  renderPosts(filtered);
  document.getElementById('filter-bar').innerHTML = 
    `<button class="filter-btn active">${cat}</button>` +
    `<button class="filter-btn" onclick="clearFilter()">全部</button>`;
}

function filterByTag(tag) {
  const filtered = window.ALL_POSTS.filter(p => p.tags && p.tags.includes(tag));
  renderPosts(filtered);
  document.getElementById('filter-bar').innerHTML = 
    `<button class="filter-btn active">${tag}</button>` +
    `<button class="filter-btn" onclick="clearFilter()">全部</button>`;
}

function clearFilter() {
  renderPosts(window.ALL_POSTS);
  document.getElementById('filter-bar').innerHTML = '';
}
</script>

</body>
</html>
