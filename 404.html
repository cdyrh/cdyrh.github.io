<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面未找到 - 池帥の亦殿</title>
<style>
:root{
  --pink:#ff8fab;--pink-deep:#e85d8a;--purple:#c77dff;
  --text:#4a4063;--text-light:#7c6f9f;--text-muted:#b0a8c8;
  --bg:#fdf4ff;--card:#fff;--border:#f0d9ff;
  --shadow:0 8px 32px rgba(200,100,200,.12);
  --radius:16px;
}
[data-theme="dark"]{
  --pink:#ff7b9e;--pink-deep:#ff6090;--purple:#b77dff;
  --text:#e0d4e8;--text-light:#b0a0c0;--text-muted:#6a5a80;
  --bg:#1a0a20;--card:#2a1a30;--border:#3a2a40;
  --shadow:0 8px 32px rgba(0,0,0,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.card{background:var(--card);border-radius:var(--radius);padding:3rem 2.5rem;box-shadow:var(--shadow);max-width:500px;width:100%;text-align:center;border:1px solid var(--border)}
.emoji{font-size:6rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
h1{font-size:4rem;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
h2{font-size:1.3rem;color:var(--text-light);margin-bottom:1.5rem;font-weight:400}
p{color:var(--text-muted);margin-bottom:1.5rem;font-size:.95rem}
.btn{display:inline-block;padding:.75rem 2rem;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;text-decoration:none;font-weight:600;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,100,150,.3)}
.links{margin-top:2rem;font-size:.88rem;color:var(--text-muted)}
.links a{color:var(--pink-deep);text-decoration:none;margin:0 .5rem}
.links a:hover{text-decoration:underline}
</style>
<script>
(function(){
  const saved = localStorage.getItem('blog_theme');
  if(saved==='dark') document.documentElement.setAttribute('data-theme','dark');
  else if(!saved && window.matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.setAttribute('data-theme','dark');
})();
</script>
</head>
<body>
<div class="card">
  <div class="emoji">🌸</div>
  <h1>404</h1>
  <h2>哎呀，这个页面走丢了</h2>
  <p>你访问的页面不存在，或者已经被移除。<br>也许是被风吹到了地球另一端的某个服务器上 🌍</p>
  <a href="/" class="btn">🏠 返回首页</a>
  <div class="links">
    <a href="/">首页</a> · 
    <a href="https://cdyrh.github.io/">博客</a>
  </div>
</div>
</body>
</html>
